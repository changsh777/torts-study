<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Practice Part 2 — Q11~Q20</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Malgun Gothic', Arial, sans-serif; font-size: 11pt; color: #111; padding: 20px; }
  h1 { font-size: 15pt; text-align: center; margin-bottom: 6px; }
  .subtitle { text-align: center; color: #555; font-size: 10pt; margin-bottom: 20px; }
  .q-block { border: 1px solid #ccc; border-radius: 6px; padding: 12px 14px; margin-bottom: 14px; page-break-inside: avoid; }
  .q-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px; }
  .q-num { font-weight: bold; font-size: 12pt; color: #1a1a8c; }
  .answer-badge { background: #1a1a8c; color: white; padding: 2px 10px; border-radius: 12px; font-size: 11pt; font-weight: bold; }
  .q-text { margin-bottom: 8px; line-height: 1.5; }
  .options { margin-bottom: 8px; }
  .option { padding: 2px 0; line-height: 1.5; }
  .option.correct { color: #1a1a8c; font-weight: bold; }
  .divider { border: none; border-top: 1px solid #ddd; margin: 8px 0; }
  .rule-box { background: #f0f4ff; border-left: 3px solid #1a1a8c; padding: 6px 10px; border-radius: 0 4px 4px 0; }
  .rule-label { font-size: 9pt; color: #555; font-weight: bold; margin-bottom: 2px; }
  .rule-text { font-size: 10pt; line-height: 1.5; }
  .exp-text { font-size: 10pt; color: #333; line-height: 1.5; margin-top: 6px; }
  @media print {
    body { padding: 10px; font-size: 10pt; }
    .q-block { margin-bottom: 10px; }
  }
</style>
</head>
<body>
<h1>Torts Practice — Part 2 (Q11~Q20)</h1>
<div class="subtitle">정답 + 핵심 법리 | 2026 UDSL</div>

<div id="questions"></div>

<script>
const questions = [
  {
    num: 11, ans: "D",
    text: "Sam and Mike had been friends since high school. They had always been competitive with each other. One day, Sam challenged Mike to play a game of paintball. Mike accepted. During the game, Sam intentionally shot Mike in the face with a paintball, causing Mike to lose the sight in his right eye. Mike had been wearing goggles, which are required safety equipment in paintball. If Mike sues Sam for battery, Sam's best defense is:",
    options: [
      {l:"A", t:"Sam did not intend to injure Mike"},
      {l:"B", t:"Mike assumed the risk of injury"},
      {l:"C", t:"The paintball game was the actual cause of the injury"},
      {l:"D", t:"Mike consented to the contact that occurred during the game"}
    ],
    rule: "Consent is the best defense to battery when plaintiff voluntarily agreed to the contact. Paintball: consent to normal paintball contact. Intentional face shot within rules of game = within scope of consent.",
    exp: "Consent = battery 최강 방어. 페인트볼 동의 = 게임 내 접촉 동의. 규칙 내 얼굴 샷 → 동의 범위 내."
  },
  {
    num: 12, ans: "B",
    text: "Megan, wife of Frank, dies on a roller coaster that malfunctions. Frank, the executor of Megan's estate, wants to recover damages. Which of the following actions would best allow him to recover damages for the loss of her guidance, advice, counsel, and consortium?",
    options: [
      {l:"A", t:"Bring a survival action on Megan's behalf for pain and suffering before death"},
      {l:"B", t:"Bring a wrongful death action on his own behalf for the loss of her guidance, advice, counsel, and consortium"},
      {l:"C", t:"Introduce evidence that she was exceptionally bright and likely would have had a high earning potential"},
      {l:"D", t:"Introduce evidence that she was exceptionally bright and likely would have had a high earning potential"}
    ],
    rule: "Wrongful death: spouse's personal loss (consortium, guidance). Survival action: decedent's own claims. C=D identical → not the answer. B is the correct theory for Frank's loss.",
    exp: "Wrongful death = 남은 가족의 손해(consortium 등). Survival action = 망인의 청구권 승계. Frank가 원하는 건 consortium → B."
  },
  {
    num: 13, ans: "A",
    text: "A warning on a product:",
    options: [
      {l:"A", t:"Is one factor in determining whether a design is defective"},
      {l:"B", t:"Completely cures a product of any design defect"},
      {l:"C", t:"Completely cures a product of any design defect"},
      {l:"D", t:"Can subject defendant to liability for failure to warn even if plaintiff admits that he did not read the warning"}
    ],
    rule: "Under risk-utility test, a warning is one factor (not dispositive) in design defect analysis. B=C wrong — warning does NOT cure design defect. D wrong — no reading = no causation for failure to warn.",
    exp: "경고는 설계 결함 판단의 한 요소. 경고가 설계 결함을 치유하지 않음(B=C 오류). D: 안 읽었으면 causation 없음."
  },
  {
    num: 14, ans: "B",
    text: "Which of the following would never be part of a strict liability claim:",
    options: [
      {l:"A", t:"Punitive damages"},
      {l:"B", t:"Whether the defendant should have been more careful"},
      {l:"C", t:"Actual damages"},
      {l:"D", t:"Whether the product was defective"}
    ],
    rule: "Strict liability does not require proof of fault/care. 'Whether defendant should have been more careful' = negligence standard, irrelevant in strict liability.",
    exp: "Strict liability = 과실 불문. '더 조심했어야 했나' = negligence 기준 → strict liability에서 절대 묻지 않음."
  },
  {
    num: 15, ans: "B",
    text: "If there is only one reasonable interpretation of a statement in a newspaper, the question of whether the statement is defamatory:",
    options: [
      {l:"A", t:"Is always a question of fact for the jury"},
      {l:"B", t:"A court may find the statement defamatory as a matter of law, without submitting the question to the jury"},
      {l:"C", t:"Is always a question of law for the judge"},
      {l:"D", t:"Must first be decided by the jury, then reviewed by the judge"}
    ],
    rule: "If only one reasonable interpretation exists → court decides as matter of law (no jury needed). If multiple interpretations → jury question.",
    exp: "해석이 하나뿐 → 법원이 law 문제로 판단. 해석 여러 개 → 배심원 결정."
  },
  {
    num: 16, ans: "A",
    text: "Which of the following factors, if largely demonstrated, is most likely to produce a finding of defamation per se?",
    options: [
      {l:"A", t:"The statement accuses plaintiff of committing a crime involving moral turpitude"},
      {l:"B", t:"The statement was made in a newspaper rather than verbally"},
      {l:"C", t:"The statement was made about a public figure"},
      {l:"D", t:"The statement was heard by many people"}
    ],
    rule: "Defamation per se: statement on its face clearly defamatory. Categories: crime of moral turpitude, loathsome disease, business/professional misconduct, sexual misconduct. A is the classic category.",
    exp: "Defamation per se = 그 자체로 명예훼손. 도덕적 타락 범죄 비난 = 가장 전형적인 per se 카테고리."
  },
  {
    num: 17, ans: "B",
    text: "A Dodge Viper is manufactured with a defective wheel. Sammy buys his Dodge Viper at Deluxe Cars. Later, Sammy sells the car to Annie. Annie gets into an accident because of the defective wheel and sues the manufacturer for strict products liability.",
    options: [
      {l:"A", t:"Annie will not prevail because she did not buy the car from the manufacturer"},
      {l:"B", t:"Annie will prevail if the wheel was defective when the car left the manufacturer's control"},
      {l:"C", t:"Annie will not prevail because the manufacturer did not know the wheel was defective"},
      {l:"D", t:"Annie will not prevail because Sammy is the proper plaintiff"}
    ],
    rule: "Strict products liability: no privity required. Defect must exist when product left defendant's control. Knowledge irrelevant. Any foreseeable user can sue.",
    exp: "Privity 불요. 제조자 통제 이탈 시 결함 존재 → Annie 승소. 지식 불요. Sammy→Annie 재판매 무관."
  },
  {
    num: 18, ans: "C",
    text: "Twenty years ago, all of the apartments in a City were painted with lead paint. A city ordinance now prohibits use of lead paint and requires removal of lead paint from all housing. Sam, a landlord who owns several apartment buildings, did not remove the lead paint as required. Sam's tenant's child was poisoned by the lead paint. The child's guardian sues Sam for negligence.",
    options: [
      {l:"A", t:"Sam is liable because lead paint is a defective product"},
      {l:"B", t:"Sam is liable if a reasonable landlord would have removed the paint"},
      {l:"C", t:"Sam is liable because he violated the city ordinance, which was designed to prevent this type of harm"},
      {l:"D", t:"Sam is not liable because the lead paint was installed before the ordinance was passed"}
    ],
    rule: "Negligence per se: violation of statute designed to prevent the type of harm that occurred, to the class of persons the statute was designed to protect. Ordinance: prevent lead poisoning → child poisoned = exact harm → negligence per se.",
    exp: "Negligence per se: 조례 위반 + 그 조례가 예방하려는 피해 발생 → breach 자동 성립. 아동 납중독 = 조례의 정확한 목적."
  },
  {
    num: 19, ans: "B",
    text: "Nuisances are:",
    options: [
      {l:"A", t:"Usually unintentional"},
      {l:"B", t:"Usually private"},
      {l:"C", t:"Usually associated with high value conduct that causes harm"},
      {l:"D", t:"Usually the basis for an injunction, especially when the loss is purely economic"}
    ],
    rule: "Most nuisance cases = private nuisance (individual's land use). Public nuisance is less common. Nuisances are usually intentional (defendant intends the activity). B is correct.",
    exp: "대부분의 nuisance = private nuisance. Public nuisance는 드묾. B(주로 private)가 정답."
  },
  {
    num: 20, ans: "B",
    text: "Which of the following is true about products liability claims:",
    options: [
      {l:"A", t:"A manufacturer is always strictly liable for any injury caused by its product"},
      {l:"B", t:"Because irreducibly unsafe products do not have a reasonable alternative design, they cannot be the basis for a design defect claim"},
      {l:"C", t:"A product must be both defective and negligently made to be the basis for a strict liability claim"},
      {l:"D", t:"Privity of contract is required for a products liability claim"}
    ],
    rule: "Irreducibly unsafe products (e.g., knives, alcohol): no reasonable alternative design → cannot be design defect. A wrong (not always). C wrong (strict ≠ negligent). D wrong (no privity required).",
    exp: "본질적으로 위험한 제품(칼 등) = 합리적 대안 설계 없음 → design defect 불가. A/C/D 모두 오류."
  }
];

const container = document.getElementById('questions');

questions.forEach(q => {
  const block = document.createElement('div');
  block.className = 'q-block';

  const header = document.createElement('div');
  header.className = 'q-header';
  header.innerHTML = `<span class="q-num">Q${q.num}</span><span class="answer-badge">정답: ${q.ans}</span>`;
  block.appendChild(header);

  const text = document.createElement('div');
  text.className = 'q-text';
  text.textContent = q.text;
  block.appendChild(text);

  const opts = document.createElement('div');
  opts.className = 'options';
  q.options.forEach(o => {
    const opt = document.createElement('div');
    opt.className = 'option' + (o.l === q.ans ? ' correct' : '');
    opt.textContent = `${o.l}. ${o.t}`;
    opts.appendChild(opt);
  });
  block.appendChild(opts);

  const hr = document.createElement('hr');
  hr.className = 'divider';
  block.appendChild(hr);

  const ruleBox = document.createElement('div');
  ruleBox.className = 'rule-box';
  ruleBox.innerHTML = `<div class="rule-label">📌 핵심 법리</div><div class="rule-text">${q.rule}</div>`;
  block.appendChild(ruleBox);

  const expDiv = document.createElement('div');
  expDiv.className = 'exp-text';
  expDiv.textContent = '→ ' + q.exp;
  block.appendChild(expDiv);

  container.appendChild(block);
});
</script>
</body>
</html>
